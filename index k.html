<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkyCast Weather</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header><h1>☁️ kartikeya weather tracking </h1></header>
    <div class="content-wrapper">
      <aside class="sidebar">
        <div class="panel">
          <label>City Search</label>
          <div class="input-row">
            <input type="text" id="citySearchInput" placeholder="Enter city...">
            <button id="btnSearch">Go</button>
          </div>
        </div>
        <div class="panel">
          <label>Search History</label>
          <div id="historyList"></div>
          <button id="clearHistoryBtn" onclick="clearStorage()">Clear</button>
        </div>
      </aside>
      <section class="main-display">
        <div class="panel full-height">
          <label>Live Weather</label>
          <div id="weatherOutput">Search a city to begin</div>
        </div>
      </section>
    </div>
    <div class="console-panel">
      <div class="console-head">
        <span>Signal Monitor</span>
        <button onclick="document.getElementById('signalConsole').innerHTML=''">Reset</button>
      </div>
      <div id="signalConsole"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
